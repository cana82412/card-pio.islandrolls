<body>

<div class="app">

<div class="header">
<h1>Island Rolls 🍦</h1>
</div>

<div class="abas">
<button class="aba-btn ativa" onclick="mudarAba('rolinhos',this)">Rolinhos</button>
<button class="aba-btn" onclick="mudarAba('acai',this)">Açaí</button>
<button class="aba-btn" onclick="mudarAba('waffle',this)">Waffle</button>
<button class="aba-btn" onclick="mudarAba('bebidas',this)">Bebidas</button>
</div>

<div id="rolinhos" class="secao ativa">

<h3>1. Base</h3>

<div class="grid-flex">

<button class="btn-opcao" onclick="setBase('Rolinho 1 Sabor',15,1,this)">
1 Sabor (R$15)
</button>

<button class="btn-opcao" onclick="setBase('Rolinho 2 Sabores',17,2,this)">
2 Sabores (R$17)
</button>

<button class="btn-opcao" onclick="setBase('Rolinho 3 Sabores',20,3,this)">
3 Sabores (R$20)
</button>

</div>

<h3>2. Sabores</h3>
<div class="grid-flex" id="list-sabores"></div>

<h3>3. Acompanhamentos</h3>
<div class="grid-flex" id="list-acomps"></div>

<h3>4. Extras</h3>
<div id="list-extras"></div>

<button class="btn-add" onclick="adicionarAoCarrinho()">
+ Adicionar
</button>

</div>

<div id="acai" class="secao">

<h3>Tamanho</h3>

<div class="grid-flex">

<button class="btn-opcao" onclick="setBase('Açaí 300ml',20,99,this)">
300ml (R$20)
</button>

<button class="btn-opcao" onclick="setBase('Açaí 400ml',23,99,this)">
400ml (R$23)
</button>

</div>

<button class="btn-add" onclick="adicionarAoCarrinho()">
+ Adicionar
</button>

</div>

<div id="waffle" class="secao">

<h3>Tamanho</h3>

<div class="grid-flex">

<button class="btn-opcao" onclick="setBase('Waffle Big',30,1,this)">
Big (R$30)
</button>

<button class="btn-opcao" onclick="setBase('Waffle Mini',22,1,this)">
Mini (R$22)
</button>

</div>

<button class="btn-add" onclick="adicionarAoCarrinho()">
+ Adicionar
</button>

</div>

<div id="bebidas" class="secao">

<h3>Bebidas</h3>

<div class="grid-flex">

<button class="btn-opcao" onclick="setBase('Coca Cola',6,1,this)">
Coca Cola
</button>

<button class="btn-opcao" onclick="setBase('Guaraná',6,1,this)">
Guaraná
</button>

<button class="btn-opcao" onclick="setBase('Água',4,1,this)">
Água
</button>

</div>

<button class="btn-add" onclick="adicionarAoCarrinho()">
+ Adicionar
</button>

</div>

</div>

<h3>🛒 Seu Carrinho</h3>

<div id="carrinho-itens">
<i>Vazio...</i>
</div>

<div style="font-weight:bold;text-align:center;margin-top:10px;">
Total: R$ <span id="total-final">0.00</span>
</div>

<strong>Forma de Pagamento:</strong>

<div class="metodo-pagamento">

<button class="btn-pag" onclick="setPagamento('Pix',this)">
Pix
</button>

<button class="btn-pag" onclick="setPagamento('Cartão',this)">
Cartão
</button>

<button class="btn-pag" onclick="setPagamento('Dinheiro',this)">
Dinheiro
</button>

</div>

<input type="text" id="campo-troco" placeholder="Troco para quanto?">

</div>

<button class="btn-enviar" onclick="enviarWhats()">
Enviar Pedido 🟢
</button>

</div>

<script>

const TELEFONE = "5512981280676";

let config = {
    nome:"",
    preco:0,
    limite:0
};

let montando = {
    sabores:[],
    extras:[],
    acomps:[]
};

let carrinhoTotal = [];

let formaPagamento = "";

const sabores = [
"Banana",
"Chocolate",
"Morango",
"Ninho",
"Oreo",
"Paçoca",
"Nutella",
"Pistache"
];

const acomps = [
"Granulado",
"Confete",
"Calda Chocolate",
"Calda Morango",
"Chocobowl"
];

const extras = [
{n:"Nutella",p:3},
{n:"Pistache",p:3},
{n:"Chantilly",p:3}
];

function mudarAba(id,btn){

    document.querySelectorAll('.secao')
    .forEach(s=>s.classList.remove('ativa'));

    document.querySelectorAll('.aba-btn')
    .forEach(b=>b.classList.remove('ativa'));

    document.getElementById(id)
    .classList.add('ativa');

    btn.classList.add('ativa');

    reset();
}

function setBase(nome,preco,limite,btn){

    config = {
        nome,
        preco,
        limite
    };

    document.querySelectorAll('.secao.ativa .btn-opcao')
    .forEach(b=>b.classList.remove('selecionado'));

    btn.classList.add('selecionado');

    montando.sabores = [];
    montando.extras = [];
    montando.acomps = [];
}

function clicouSabor(nome,btn){

    if(!config.nome){
        alert("Escolha a base primeiro");
        return;
    }

    const existe = montando.sabores.indexOf(nome);

    if(existe > -1){

        montando.sabores.splice(existe,1);
        btn.classList.remove('selecionado');

    }else{

        if(montando.sabores.length >= config.limite){
            alert("Limite atingido");
            return;
        }

        montando.sabores.push(nome);
        btn.classList.add('selecionado');
    }
}

function toggleAcomp(nome,btn){

    const existe = montando.acomps.indexOf(nome);

    if(existe > -1){

        montando.acomps.splice(existe,1);
        btn.classList.remove('selecionado');

    }else{

        montando.acomps.push(nome);
        btn.classList.add('selecionado');
    }
}

function addExtra(nome,preco,btn){

    montando.extras.push({
        nome,
        preco
    });

    btn.innerText = "✓";

    setTimeout(()=>{
        btn.innerText = "Add";
    },600);
}

function adicionarAoCarrinho(){

    if(!config.nome){
        alert("Escolha um item");
        return;
    }

    let total = config.preco;

    montando.extras.forEach(e=>{
        total += e.preco;
    });

    carrinhoTotal.push({
        base:config.nome,
        sabores:[...montando.sabores],
        acomps:[...montando.acomps],
        extras:[...montando.extras],
        total
    });

    render();

    reset();
}

function render(){

    const lista = document.getElementById('carrinho-itens');

    if(carrinhoTotal.length === 0){

        lista.innerHTML = "<i>Vazio...</i>";

    }else{

        let totalGeral = 0;

        lista.innerHTML = carrinhoTotal.map((item,index)=>{

            totalGeral += item.total;

            return `
            <div class="item-c">

            <button class="btn-excluir"
            onclick="removerItem(${index})">
            X
            </button>

            <b>${item.base}</b><br>

            Sabores:
            ${item.sabores.join(', ') || 'Nenhum'}<br>

            Acompanhamentos:
            ${item.acomps.join(', ') || 'Nenhum'}<br>

            Extras:
            ${item.extras.map(e=>e.nome).join(', ') || 'Nenhum'}<br>

            <b>R$ ${item.total.toFixed(2)}</b>

            </div>
            `;

        }).join('');

        document.getElementById('total-final')
        .innerText = totalGeral.toFixed(2);
    }
}

function removerItem(index){

    carrinhoTotal.splice(index,1);

    render();
}

function reset(){

    config = {
        nome:"",
        preco:0,
        limite:0
    };

    montando = {
        sabores:[],
        extras:[],
        acomps:[]
    };

    document.querySelectorAll('.secao.ativa .btn-opcao')
    .forEach(b=>b.classList.remove('selecionado'));
}

function setPagamento(tipo,btn){

    formaPagamento = tipo;

    document.querySelectorAll('.btn-pag')
    .forEach(b=>b.classList.remove('selecionado'));

    btn.classList.add('selecionado');

    document.getElementById('campo-troco').style.display =
    tipo === "Dinheiro" ? "block" : "none";
}

function enviarWhats(){

    if(carrinhoTotal.length === 0){
        alert("Carrinho vazio");
        return;
    }

    if(!formaPagamento){
        alert("Escolha o pagamento");
        return;
    }

    let msg = "🍦 *NOVO PEDIDO*%0A%0A";

    carrinhoTotal.forEach((item,index)=>{

        msg += `*${index+1}. ${item.base}*%0A`;
        msg += `Sabores: ${item.sabores.join(', ') || 'Nenhum'}%0A`;
        msg += `Acompanhamentos: ${item.acomps.join(', ') || 'Nenhum'}%0A`;
        msg += `Extras: ${item.extras.map(e=>e.nome).join(', ') || 'Nenhum'}%0A`;
        msg += `Valor: R$ ${item.total.toFixed(2)}%0A%0A`;

    });

    msg += `*Pagamento:* ${formaPagamento}%0A`;
    msg += `*Total:* R$ ${document.getElementById('total-final').innerText}`;

    window.open(
        `https://wa.me/${TELEFONE}?text=${msg}`,
        '_blank'
    );
}

function init(){

    document.getElementById('list-sabores').innerHTML =
    sabores.map(s=>`
        <button class="btn-opcao"
        onclick="clicouSabor('${s}',this)">
        ${s}
        </button>
    `).join('');

    document.getElementById('list-acomps').innerHTML =
    acomps.map(a=>`
        <button class="btn-opcao"
        onclick="toggleAcomp('${a}',this)">
        ${a}
        </button>
    `).join('');

    document.getElementById('list-extras').innerHTML =
    extras.map(e=>`
        <div class="item-pagamento">
            <span>${e.n} (+R$${e.p})</span>

            <button class="btn-opcao"
            onclick="addExtra('${e.n}',${e.p},this)">
            Add
            </button>
        </div>
    `).join('');

    console.log("Sistema iniciado");
}

window.onload = init;

</script>

</body>
</html>
